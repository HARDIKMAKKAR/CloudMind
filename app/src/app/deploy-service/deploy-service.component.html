<!-- deploy.component.html -->

<div class="deploy-page">

  <div class="deploy-card">

    <div class="deploy-header">

      <div>
        <h1>Deploy Service</h1>

        <p>
          Deploy and manage your infrastructure workloads
        </p>
      </div>

      <div class="environment-badge">
        Production
      </div>

    </div>

    <div class="deploy-form">

      <div class="input-group">

        <label>
          Git Repository
        </label>

        <input
          type="text"
          [(ngModel)]="repoUrl"
          placeholder="https://github.com/user/project"
        />

      </div>

      <div class="input-group">

        <label>
          Service Name
        </label>

        <input
          type="text"
          [(ngModel)]="projectName"
          placeholder="auth-service"
        />

      </div>

      <button (click)="deploy()">
        Deploy Application
      </button>

      <div
        *ngIf="message"
        class="deploy-message"
      >
        {{ message }}
      </div>

    </div>

  </div>

</div>

<h1 class="text-3xl font-bold mb-8">
  Services Dashboard
</h1>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

  <div
    *ngFor="let service of services"
    class="bg-slate-800 p-6 rounded-2xl shadow-lg border border-slate-700"
  >

    <div class="flex justify-between items-center mb-4">

      <h2 class="text-xl font-bold">
        {{ service.name }}
      </h2>

      <span
        class="px-3 py-1 rounded-full text-sm"
        [ngClass]="{
          'bg-green-500': service.status === 'running',
          'bg-red-500': service.status === 'failed',
          'bg-yellow-500': service.status === 'stopped'
        }"
      >
        {{ service.status }}
      </span>

    </div>

    <p>
      Port: {{ service.port }}
    </p>

    <p>
      Replicas: {{ service.replicas }}
    </p>

    <div class="flex flex-wrap gap-2 mt-6">

      <button
        routerLink="/monitor/{{service.serviceId}}"
        class="bg-cyan-600 px-4 py-2 rounded-lg"
      >
        Monitor
      </button>

      <button
        routerLink="/logs/{{service.name}}"
        class="bg-purple-600 px-4 py-2 rounded-lg"
      >
        Logs
      </button>

      <button
        (click)="stop(service.serviceId)"
        class="bg-yellow-600 px-4 py-2 rounded-lg"
      >
        Stop
      </button>

      <button
        (click)="restart(service.serviceId)"
        class="bg-green-600 px-4 py-2 rounded-lg"
      >
        Restart
      </button>

</div>
